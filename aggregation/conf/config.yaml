defaults:
  - _self_

data:
  # Required - paths to jersey_id_results*.json and *_gt.json
  str_results: ???
  gt: ???
  # Optional separate val set; if null, a stratified split of the train data is used
  val_str_results: null
  val_gt: null
  val_split: 0.20
  # Optional test set for final evaluation after training
  test_str_results: null
  test_gt: null

model:
  # Set to true once MoviNet 1-vs-2 digit classifier is available
  use_digit_classifier: false

training:
  epochs: 8
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  seed: 42
  num_workers: 2
  use_class_weights: true
  early_stopping_patience: 10

output:
  output_dir: aggregation/checkpoints
  run_name: null  # auto-generated by W&B if null

wandb:
  project: jersey-aggregation
  # entity is read from WANDB_ENTITY env var (set in aggregation/.env)
  # override here only if you want a different entity for this specific run
  entity: null
  enabled: true

# Prevent Hydra from creating outputs/ directory and changing working directory
hydra:
  run:
    dir: .
  output_subdir: null
  job_logging:
    root:
      level: WARNING
