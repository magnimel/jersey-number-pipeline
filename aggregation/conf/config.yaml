defaults:
  - _self_

data:
  # Paths to jersey_id_results*.json and *_gt.json
  # Defaults read from env vars (set in aggregation/.env); override on CLI as needed
  str_results: ${oc.env:AGG_STR_RESULTS,???}
  gt: ${oc.env:AGG_GT,???}
  # Optional separate val set; if null, a stratified split of the train data is used
  val_str_results: null
  val_gt: null
  val_split: 0.30
  # Optional test set for final evaluation after training
  test_str_results: ${oc.env:AGG_TEST_STR_RESULTS,null}
  test_gt: ${oc.env:AGG_TEST_GT,null}
  # Digit classifier prediction files (auto-derived from DIGIT_CLASSIFIER_NAME in .env)
  digit_train_preds: ${oc.env:AGG_DIGIT_TRAIN_PREDS,null}
  digit_test_preds: ${oc.env:AGG_DIGIT_TEST_PREDS,null}

model:
  use_digit_classifier: true

training:
  epochs: 8
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  seed: 42
  num_workers: 2
  use_class_weights: true
  early_stopping_patience: 10

output:
  output_dir: ${oc.env:AGG_OUTPUT_DIR,aggregation/checkpoints}
  run_name: null  # auto-generated by W&B if null

wandb:
  project: jersey-aggregation
  # entity is read from WANDB_ENTITY env var (set in aggregation/.env)
  # override here only if you want a different entity for this specific run
  entity: null
  enabled: true

# Prevent Hydra from creating outputs/ directory and changing working directory
hydra:
  run:
    dir: .
  output_subdir: null
  job_logging:
    root:
      level: WARNING
