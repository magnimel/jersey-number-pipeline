program: aggregation/train.py
method: bayes
metric:
  name: val/acc
  goal: maximize

# W&B passes parameters as key=value (no hyphens) which is valid Hydra syntax
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}

parameters:
  training.lr:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-2
  training.batch_size:
    values: [32, 64, 128]
  training.weight_decay:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-2
  training.use_class_weights:
    values: [true, false]
  # Fixed across all sweep runs
  training.epochs:
    value: 50
  training.early_stopping_patience:
    value: 5
  training.seed:
    value: 42
