program: digit_classifier/train.py
command:
  - ${env}
  - python
  - ${program}
  - --skip_test
  - ${args}
method: bayes
metric:
  name: val_acc
  goal: maximize

parameters:
  lr:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-3
  weight_decay:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-2
  batch_size:
    values: [16, 32, 64]
  n_frames:
    values: [64, 128, 256]
  model_id:
    values: ["a0", "a1", "a2", "a3", "a4", "a5"]
  # Fixed across all sweep runs
  epochs:
    value: 20
  early_stopping_patience:
    value: 5
  val_split:
    value: 0.2
  seed:
    value: 42
